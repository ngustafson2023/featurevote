[auth]
site_url = "https://featurevote.bootstrapquant.com"
additional_redirect_urls = ["https://featurevote.bootstrapquant.com/**", "http://localhost:3000/**"]

[auth.email]
enable_signup = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
